  held_out_responses:
    insurance_non_renewal:
      real_response: Our insurance company renewed our insurance and told us our house
        had a very low chance of burning down. I'm very superstitious about it and
        don't want to talk about it or even say which company we're with because I
        don't want it associated with my address. Meanwhile, somebody else on the
        block was told that as soon as they said 94708, which is our zip code, they
        said absolutely not, we don't insure houses in 94708. Another insurance company
        raised someone's rate from ten thousand dollars to seventeen thousand dollars
        a year for fire insurance on the next adjoining block. What the insurance
        companies are doing is far more inconsistent than anything else we've discussed.
      context: When asked about insurance and whether the platform could help with
        insurance issues, she explained her own insurance situation and the dramatic
        variability she has observed among neighbors.
    defensible_space_inspection:
      real_response: We had two Fire Marshals from the Berkeley fire department come
        to our house already to talk to us about what we would need to do to satisfy
        the Berkeley law that's supplementing the state law. They told us, kind of
        surprisingly, because I thought they were going to make us cut these trees
        down, which was going to be terrible, that even in the most damaged fire areas
        trees don't burn down because it's very hard to catch a tree trunk on fire.
        They said you have to avoid having the leaves at the top kind of overhang
        the roof, but you can talk the tree up, so we had all our trees trimmed. The
        fire guys said I'm not sure they'll make you take that out [referring to the
        silk tassel]. You might try to get away with it if you clear all the foliage
        up to four feet and make sure it's clearing the windows. He told me, he gave
        me some hope. I'm not gonna cut it down until they come again.
      context: When describing the compliance requirements and her concerns about
        losing Japanese maple trees and a silk tassel bush that have been growing
        for 40 years.
    neighbor_pressure:
      real_response: I got his name [Nigel, the contractor] from my neighbors across
        the street because I'm still a working lawyer and my time is much more valuable
        to me than the money. My neighbor had work done, and they did a good job,
        and I saw it done and saw what it looked like, and everything was good, so
        I just went with that company. I hate getting lots and lots of estimates because
        it's just a time suck, and you never totally know if they're equivalent. My
        neighbors across the street, they literally complied unbelievably because
        their insurance had been canceled.
      context: When asked how she found the contractor she hired and whether she got
        multiple quotes.
    firewise_outreach:
      real_response: There have been so many meetings. So many meetings. There's meetings
        at the church on the corner. There've probably been 10 or 15 meetings. There's
        been web meetings, and I haven't gone to any of them. I plan to go to one,
        and I never managed to go. It's like you have your life and you don't want
        to spend all this time. I found out about a lot of it from my neighbors across
        the street and from the guy who came by [Nigel]. He knew a lot of stuff. He
        was very knowledgeable about what needs to be done to prevent fires, and that's
        one reason why a lot of people probably paid him more because he was extremely
        knowledgeable.
      context: When explaining where she got information about compliance requirements
        and why she hasn't attended community meetings.
    financial_assistance:
      real_response: The Berkeley fire department gave us materials for free—netting,
        metal netting—and they took our plastic gutter filters and changed every single
        gutter on our entire house to be metal mesh because they said that if embers
        hit your gutters and your gutters always have garbage on them, the metal mesh
        really keeps everything out but the plastic mesh will burn up instantaneously.
        We were notified that the fire department would give these materials for free.
        My husband went like three or four times, and every time he went and made
        an appointment, nobody was there to give it to him, so it was very crazy.
        I mean, that was real, even though I really like the Berkeley fire department.
        But we finally got it. The Berkeley fire department said that if you're over
        65, I think they would do some of that removal for you. They offered doing
        that to us, and I didn't. I just have a gardener, and we've had the gardener
        take some of this stuff out.
      context: When describing the home hardening work she completed and how she obtained
        materials and considered assistance programs.
