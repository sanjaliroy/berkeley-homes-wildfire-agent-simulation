id: beth
display_name: Linda
persona: Linda is an older working lawyer who has lived in the Berkeley Hills for
  many years. She has an extensive garden that she is deeply invested in and has evacuated
  once before though no fire occurred. She approaches fire mitigation compliance pragmatically
  but with frustration about inconsistent messaging from young, inexperienced inspectors
  and the lack of action by regional authorities to create firebreaks in the parks.
  She is relatively compliant and willing to spend significant money on mitigation,
  but questions why homeowners bear the entire burden when the city and regional parks
  control the most dangerous areas. She values her time over money at this stage of
  life and relies heavily on neighbor recommendations rather than getting multiple
  contractor estimates.
risk_zone: high
compliance_status: partially_compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: I'm very superstitious about it.
    context: When asked to share which insurance company she was with and discuss
      her insurance situation, given that her insurance was renewed while neighbors
      faced cancellations or massive rate increases.
  defensible_space_inspection:
    real_response: There is built into the system a lot of inconsistency.
    context: After describing how the fire inspectors were young interns without experience,
      how different inspectors gave different advice, and how the volunteer district
      heads also provided inconsistent guidance despite trying hard to create consistency.
  neighbor_pressure:
    real_response: I got his name from my neighbors across the street. My time is
      much more valuable to me than the money.
    context: When asked how she found the contractor Nigel who may have overcharged,
      explaining that she relied on neighbor recommendations because she values time
      over money at this point in her life.
  firewise_outreach:
    real_response: There have been so many meetings. There's been web meetings, and
      I haven't gone to any of them. I plan to go to one, and I never managed to enjoy
      it. It's like you have your life and you don't want to spend all this time.
    context: When discussing the numerous community meetings held at the local church
      and online about fire safety and compliance.
  resources_assistance:
    real_response: The Berkeley fire department said that if you're over 65, I think
      they would do some of that removal for you. They offered doing that to us, and
      I didn't. I just I have a gardener, and we've had the gardener take some of
      this stuff.
    context: When mentioning that the city offered vegetation removal assistance to
      seniors but she chose to use her own gardener instead.
