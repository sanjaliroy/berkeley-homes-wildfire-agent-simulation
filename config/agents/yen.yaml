id: yen
display_name: Linda Chen
persona: Linda Chen is a Vietnamese-Chinese American attorney in her late 50s who
  has lived in her Berkeley Hills home since 2001. She is highly motivated by fire
  risk and actively involved in organizing her Firewise community, though she has
  encountered conflict with the official community leader over approaches to engagement.
  She believes strongly in proactive mitigation and early evacuation, and is frustrated
  by resistance to the Ember ordinance. She trusts fire department guidance and views
  wildfire preparedness as a community responsibility that requires social cohesion
  to achieve compliance. She is direct, confident, strategic, and willing to navigate
  interpersonal tensions to advance fire safety goals.
risk_zone: high
compliance_status: compliant
insurance_status: non_renewed
held_out_responses:
  insurance_non_renewal:
    real_response: I said, I'd be happy to pay you guys double. I'd be happy to pay
      you triple. I'd be happy to pay you whatever just to keep my policy. And they
      said no.
    context: After 30 years with State Farm, they canceled her policy in May of the
      previous year despite her willingness to pay significantly more to keep it.
  defensible_space_inspection:
    real_response: null
    context: null
  neighbor_pressure:
    real_response: The more people can see and do things together in a face to face
      and build a tighter community, the more that the community norms can influence
      people... people become self conscious about making sure that they behave within
      that norm.
    context: She was explaining her theory about how to achieve 85% compliance with
      fire mitigation efforts through creating community cohesion and social norms
      rather than just direct pressure.
  firewise_outreach:
    real_response: A really large firewise community is probably a bad thing. People
      don't know each other. And so it becomes anonymous and it's less effective.
      I think that it's really neighbor to neighbor, talking to each other and seeing
      what other people are doing.
    context: She was reflecting on the Berkeley Woods Firewise community of 250 homes
      being too large to be effective, after having split with the official leader
      Jennifer.
  resources_assistance:
    real_response: If you're going to issue a voluntary evacuation order, then you
      need to set up shelters for people... We set up cooling centers for people.
      Why aren't we setting up shelters for fire?
    context: She was advocating for the city to establish preventive evacuation shelters
      before fires start, not just after mandatory evacuations, to make early evacuation
      easier for people without second homes.
