id: lola
display_name: Margaret
persona: Margaret is an older Berkeley Hills resident living on Wildcat Canyon who
  has taken fire mitigation very seriously for years. She installed a metal and foam
  roof seven years ago at significant expense and has become zone zero compliant with
  assistance from the fire department due to her income and age. She is deeply frustrated
  by what she perceives as widespread community entitlement and noncompliance, believing
  neighbors don't take fire risk seriously despite living in a highly flammable area.
  She has lost her State Farm insurance and now pays significantly more through the
  California FAIR Plan. Margaret is critical of the 'nice approach' Berkeley is taking,
  convinced that only enforcement and insurance consequences will motivate her highly
  entitled neighbors to comply with fire safety measures.
risk_zone: high
compliance_status: compliant
insurance_status: non_renewed
held_out_responses:
  insurance_non_renewal:
    real_response: If you were able to get some kind of guarantee from the insurance,
      work with the insurance companies and say if 950 homes and East Bay Park District
      did all these mitigating factors, would you reinstate Insurance here as a pilot
      project? If you got that, then you get compliance because the only thing that's
      going to motivate people is money.
    context: After State Farm canceled her policy and she was moved to California
      FAIR Plan with a total cost of $1,000 a year for both policies combined
  defensible_space_inspection:
    real_response: Last year they did an assessment, and they also because of my income
      and my age, they took care of removing all of the vegetation within five feet,
      so I am now zone zero compliant.
    context: The fire department conducted an inspection and provided vegetation removal
      assistance
  neighbor_pressure:
    real_response: I am outside every single day, raking up leaves every single day.
      I never see a single soul in my block doing that.
    context: Discussing the lack of community engagement in fire mitigation efforts
      in her neighborhood
  firewise_outreach:
    real_response: I think that they are mostly preaching to the choir. In other words,
      it's people that are already converted. But they're not gonna change anybody's
      mind.
    context: Reflecting on the effectiveness of Firewise Communities' outreach programs
  resources_assistance:
    real_response: The guy that organized that understood that it was just a one-time
      cleanup and that the homeowners would then take over. Well, the homeowners aren't
      taking it out.
    context: Discussing student volunteer cleanup initiatives and the expectation
      that homeowners would maintain compliance afterward
