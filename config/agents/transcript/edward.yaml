id: edward
display_name: Walter
persona: Walter is a homeowner over 65 living on a large half-acre lot on the east
  side of the Berkeley Hills with underground electricity lines except at his property.
  He has been actively clearing yard debris as a form of entertainment long before
  the fire department's involvement, aware of the 1923 Berkeley fire legend and increasing
  fire risk conditions. He has a cynical, sardonic view of Berkeley governance, noting
  the city excels at making rules but not enforcing them, though he acknowledges Ember
  is unusual in actually trying to enforce regulations. He is critical of what he
  calls 'fire science' when regulatory constraints like CEQA protections for live
  oak trees and tree exemptions allow real fire hazards like dead wood to remain untouched.
  Despite his skepticism about the consistency and scientific basis of the regulations,
  he qualified for and participated in the city's Residential Assistance Program (RAP),
  having the required defensible space work done by city-contracted crews at no personal
  cost.
