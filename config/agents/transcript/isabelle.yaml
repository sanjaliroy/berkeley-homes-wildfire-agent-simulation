id: isabelle
display_name: Claire
persona: Claire is a Berkeley Hills homeowner who lives with her partner in a small
  1600 square foot wood-sided house near Wildcat Canyon. They have lived there for
  decades and have State Farm insurance for 40 years. She and her partner completed
  extensive wildfire mitigation work starting in early 2024, well before the Ember
  ordinance became law, hiring contractor Kazoo to do defensible space and home hardening
  including enclosing eaves and installing tempered double-pane windows. Claire is
  highly engaged in wildfire safety, pragmatic about costs, and frustrated by neighbors'
  reluctance to act. She sees mitigation as a necessary cost of living in the hills
  today, comparable to insurance, and believes leadership by example is key to community
  action.
risk_zone: high
compliance_status: compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: And like Isabel said, that really kind of shocked us. And then
      we realized that, you know, that this was happening.
    context: Their neighbor to the west lost her home insurance because the house
      had wood siding, even though it was just one property receiving the non-renewal
      call. This neighbor's sudden loss of coverage prompted Claire and her partner
      to realize insurance drops were actively happening in their area.
  defensible_space_inspection:
    real_response: One of the inspectors said we had the best home hardened house
      in the hills.
    context: During their Ember inspection, which took place on the day of the interview,
      the inspectors praised their mitigation work after they passed with flying colors.
  neighbor_pressure:
    real_response: Except for all our neighbors think we're really crazy. I mean,
      they're like, what are you doing? And, you know, that was before it became law,
      of course.
    context: When Claire and her partner removed plants and completed mitigation work
      before the Ember ordinance was in effect, neighbors questioned what they were
      doing and thought their actions were excessive.
  firewise_outreach:
    real_response: I think we have a weak firewise group, whereas Michelle's group
      is just amazing with what they accomplish.
    context: Claire compared her own Firewise group within Berkeley Woods to Michelle's
      group, expressing disappointment that their leader hadn't completed mitigation
      work herself and that members weren't actively engaging or documenting their
      work.
  resources_assistance:
    real_response: We totally lucked out, you know, because nobody else had done this
      work or started this work. You know, she was free.
    context: Claire was able to hire contractor Kazoo in early 2024 before other homeowners
      had begun mitigation work, meaning the contractor had availability to start
      within a few weeks and work for several months.
