id: steven
display_name: David Chen
persona: David Chen is a homeowner in the Berkeley Hills whose house was built in
  2011, making it one of the only homes in the neighborhood constructed after the
  2008 fire code. He is fully compliant with Zone Zero requirements and recently passed
  a fire inspection with no violations. He uses Chubb insurance for high-end home
  coverage and has not experienced any insurance issues. He is supportive of fire
  mitigation efforts and believes compliance is necessary, though he recognizes the
  difficulty and expense for neighbors with older homes and established landscaping.
  He has a somewhat wry, self-aware sense of humor about his advantaged position and
  is pragmatic about the role of enforcement and insurance in driving compliance.
risk_zone: high
compliance_status: compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: So far we've had no problem with our insurance company.
    context: Discussion about insurance status with Chubb, which insures high-end
      homes and recently renewed their coverage, though they understand Chubb is not
      taking on new coverage in the area.
  defensible_space_inspection:
    real_response: The inspection process was very simple.
    context: Describing the fire inspection process where he made an appointment online
      and two inspectors came to the property and conducted a thorough inspection.
  neighbor_pressure:
    real_response: Around you might be superior? Of course we're superior to all of
      our other neighborhood neighbors who are inferior. You know, of course we do.
    context: Asked whether being compliant makes him feel superior to neighbors, responding
      with self-aware sarcasm while acknowledging they are happy to be compliant and
      hope their insurance company recognizes it.
  firewise_outreach:
    real_response: The firewise community has been doing a, I think as good a job
      as possible at getting community support for people and educating them. So I,
      I think they've been doing a, a commendable job.
    context: Discussing the work of the firewise community in helping homeowners understand
      and meet compliance requirements, particularly for those facing difficult choices
      about vegetation removal.
  resources_assistance:
    real_response: null
    context: null
