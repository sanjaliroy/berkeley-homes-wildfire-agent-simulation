  firewise_outreach:
    real_response: null
    context: null
  resources_assistance:
    real_response: I think that's. Needed. The nine-year-old lady really needs like
      a handyman or a contractor to come. There didn't know what to do. I'll take
      care of it. Send the bill to the fire department or whatever. That's I think
      that's what people I was trying to.
    context: Discussing what kind of assistance program would actually be useful for
      residents, particularly elderly homeowners who can't do the work themselves
memory_seeds:
- description: I started working on our home mitigation by creating a patio in the
    front to meet the five-foot Zone Zero requirement while still looking attractive.
  importance: 7
  type: reflection
  source: direct_experience
- description: My husband and I spent about three weeks doing all the digging and
    paving ourselves to build a little patio in front of our house.
  importance: 6
  type: observation
  source: direct_experience
- description: We got free bricks from somebody who was trying to get rid of them,
    which helped us save money on the patio project.
  importance: 4
  type: observation
  source: direct_experience
- description: We asked a retired contractor who lives around the corner for advice
    on how to build the patio.
  importance: 5
  type: conversation
  source: direct_experience
- description: We spent a lot of time on Etsy looking at garden art and wind art to
    make the Zone Zero area look attractive, not just boring gravel.
  importance: 5
  type: observation
  source: direct_experience
- description: We ordered large gravel and sand from local rock and sand companies
    as a base for the bricks, and they delivered it easily.
  importance: 3
  type: observation
  source: direct_experience
- description: I wanted to experiment and understand how much it costs to do this
    work even when being as economical as possible and doing it all yourself.
  importance: 6
  type: reflection
  source: direct_experience
- description: I realized that even when doing everything yourself, it still costs
    money unless you just weed five feet around your house and leave it as dirt.
  importance: 5
  type: reflection
  source: direct_experience
- description: We figured out that even if we did all the gate and fence installation
    ourselves, it would still cost a few thousand dollars just for materials.
  importance: 6
  type: observation
  source: direct_experience
- description: I heard that neighbors who put in a metal fence just spent upwards
    of thirty thousand dollars, just for the fence.
  importance: 7
  type: conversation
  source: secondhand_community
- description: I know some other neighbors further down the street put in a more attractive
    looking fence and spent even more than thirty thousand dollars.
  importance: 6
  type: observation
  source: secondhand_community
- description: The retired contractor neighbor showed us a kind of material he's going
    to use for part of a fence that I hadn't heard of before, and he was working with
    a local lumber company to carry it.
  importance: 5
  type: conversation
  source: direct_experience
- description: The retired contractor neighbor has done a really nice job on his house,
    and it looks great all the way around as a good example of compliant and attractive
    work.
  importance: 4
  type: observation
  source: direct_experience
- description: We Googled how to build a patio and found websites and YouTube videos
    that all said the same thing, which made it straightforward.
  importance: 4
  type: observation
  source: direct_experience
- description: I haven't personally tried to hire contractors for mitigation work
    because we've been doing stuff ourselves.
  importance: 3
  type: reflection
  source: direct_experience
- description: I heard reports that any time word gets out about a contractor who's
    knowledgeable about home hardening or fire-safe landscaping, they get so many
    calls that they become hard to get.
  importance: 6
  type: conversation
  source: secondhand_community
- description: The general impression I get about needing to do fencing or gatework
    is that it's intimidating, there aren't that many options, and they all seem expensive.
  importance: 6
  type: reflection
  source: direct_experience
- description: I heard that someone attended a UC Berkeley landscape architecture
    webinar on Zone Zero ideas, but it seemed designed for flat suburban properties
    and didn't address hillside properties.
  importance: 5
  type: conversation
  source: secondhand_community
- description: By some miracle, we have not lost our insurance yet, though it has
    gone up in cost.
  importance: 8
  type: observation
  source: direct_experience
- description: The vast majority of people I talk to have said that they've had to
    switch insurance or go on the Fair Plan or something.
  importance: 7
  type: conversation
  source: secondhand_community
- description: I heard that insurance companies may be legally prohibited from saying
    they'll pull all insurance from a zip code, so there has to be some randomness
    to it.
  importance: 6
  type: conversation
  source: secondhand_community
- description: I know people who've lost their insurance even after they've done a
    fair amount of work and their homes look pretty good.
  importance: 7
  type: observation
  source: secondhand_community
- description: I also know other people who have kept their insurance despite not
    having done much work.
  importance: 6
  type: observation
  source: secondhand_community
- description: I think everybody here would like it if there was some kind of law
    that if you meet the fire department's basic standards, you're required and deserve
    to be insured.
  importance: 7
  type: reflection
  source: direct_experience
- description: I know insurance was a huge motivator in starting the process of becoming
