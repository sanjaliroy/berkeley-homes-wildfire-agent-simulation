id: jennifer
display_name: Laura
persona: Laura is a Berkeley Hills homeowner who lives with her handy husband and
  has been actively engaged with wildfire mitigation efforts in her community. She
  approaches fire safety pragmatically, doing much of the work herself to save costs
  and serve as an example to neighbors. She has observed significant polarization
  in community opinions about fire safety requirements and recognizes the complexity
  of issues around insurance, aesthetics, and affordability. Laura is empathetic to
  the struggles of other homeowners and values hands-on problem-solving, though she
  acknowledges the overwhelming nature of the process and the limitations of available
  resources and contractor knowledge.
risk_zone: high
compliance_status: partially_compliant
insurance_status: retained
held_out_responses:
