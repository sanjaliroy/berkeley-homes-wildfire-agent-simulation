insurance_status: unknown
compliance_status: in_progress
risk_zone: high
tilden_proximity: front_line

# Property attributes
property_type: single_family
lot_size: unknown
roof_type: unknown
siding: unknown
eaves_vents: addressed
vegetation_zone0: partial
vegetation_zone1: partial
