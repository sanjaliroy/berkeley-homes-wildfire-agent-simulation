      She consciously sequences work, such as waiting for rains to begin before moving
      plants to ensure their survival. She's an avid gardener, integrating plant removal
      and relocation into her mitigation strategy. She avoids getting multiple estimates
      due to the perceived time suck and lack of clear comparison.
    material_sourcing: She sourced metal netting for home hardening directly from
      the Berkeley Fire Department, who provided it for free. For larger projects
      like metal gates, she ordered them from a small family company that her neighbors
      had successfully used, valuing the trusted recommendation over extensive research
      for estimates.
    completed: Eleanor has already removed a significant number of bushes within five
      feet of her house and had all her trees trimmed, ensuring sufficient clearance
      from the roof. She has replaced all plastic gutter filters with metal mesh and
      installed mesh covers on all fireplace, heating, and other vents that lead into
      the house to prevent ember intrusion.
    next_priority: She still has more vegetation to remove, including a large silk
      tassel plant trellised on the side of her house, though she is waiting for further
      clarification from inspectors before cutting it down. Her next major project
      is the installation of four new metal gates to replace existing wooden ones,
      which she has already ordered and is awaiting delivery.
