  importance: 6
  type: observation
  source: direct_experience
- description: There were five years of this Redwood mulch called gorilla fur that
    the landscapers just kept putting more down on top of, so it was literally six
    to twelve inches thick in places, and I had to take all of it out, which was an
    unbelievable amount of work.
  importance: 6
  type: observation
  source: direct_experience
- description: I suspect I will probably have ten to twenty thousand dollars of expenses
