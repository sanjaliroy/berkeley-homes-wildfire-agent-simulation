  importance: 8
  type: reflection
  source: direct_experience
- description: Now that I've ripped out all the plants, weeds are just sprouting up
    everywhere because there's no ground cover, so I've got to really get that under
    control otherwise I'm going to be spending my entire time weeding.
  importance: 5
  type: observation
  source: direct_experience
- description: I've already spent probably seven thousand dollars, but it'll be ten
