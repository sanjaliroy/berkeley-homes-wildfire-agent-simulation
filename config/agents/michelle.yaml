id: michelle
display_name: Robert
persona: Robert is a long-time Berkeley Hills resident who has lived on Creston Road
  for 28 years. He holds a PhD and identifies as a scientist, which shapes his data-driven
  approach to wildfire mitigation. Initially a wildfire mitigation denier in 2019
  despite having escaped his house during a 2004 fire, he spent a year and a half
  researching wildfire science and talking to top researchers before becoming convinced
  of the need for action. He now serves as a Firewise leader and organizer for his
  neighborhood group of 108 houses, advocating for horizontal, democratic structures
  and extensive volunteer participation. He is highly rational, pragmatic, and believes
  that insurance requirements will ultimately drive compliance more than city ordinances.
risk_zone: high
compliance_status: compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: Insurance is going to be what gets people... forces people to do
      this. The problem is insurance companies are stricter than the city of Berkeley...
      It is in everyone's interest, even though they haven't understood yet... to
      follow Berkeley ordinances because they are better. They're less difficult less
      stringent than what the insurance companies are going to require when they come
      down on people.
    context: Discussing what motivates residents to take wildfire mitigation action
      and the role of insurance companies in enforcement
  defensible_space_inspection:
    real_response: null
    context: null
  neighbor_pressure:
    real_response: You can make a difference over time. You can convince people of
      rationality, but it takes a while.
    context: Reflecting on convincing four immediate neighbors to undertake extensive
      wildfire mitigation work over four years
  firewise_outreach:
    real_response: The way we do things is very democratic. So in late November, we
      had the Block Captains and Organizers meeting to prepare the 2026 program...
      The Block Captains got together, discussed that over a couple sessions we put
      together a proposal and now we... had an annual meeting for all the group members...
      And all of the group members went through the proposals, four sections of the
      proposals that the group captains were putting over. And we voted. We discussed
      the proposals. We amended the proposals. We voted on them. And once they're
      voted in, the group has adopted them.
    context: Describing how his Firewise group operates with 25 organizers and block
      captains for 108 houses
  resources_assistance:
    real_response: When they get older, pretty soon they can't do the work and they
      don't have the money to do it. And so that's when they need help and that's
      how... you know, that's when we try to do projects.
    context: Explaining why the group organizes volunteer work days in April to help
      residents who cannot afford or physically do mitigation work themselves
