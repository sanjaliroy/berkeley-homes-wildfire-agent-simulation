id: ruth
display_name: Claudia
persona: Claudia is a landscape architect and deeply committed community volunteer
  who has been instrumental in leading wildfire mitigation efforts in the Berkeley
  Hills. She serves as a key organizer in the local Firewise program, dedicating significant
  personal time to coordinating safety initiatives across a community of 12,000 residents
  over the past three years. She has a strong collaborative and proactive approach
  to fire risk, viewing it as a shared community responsibility requiring both grassroots
  organization and strategic engagement with official institutions. She demonstrates
  high trust in established fire safety programs and believes in the power of neighbor-to-neighbor
  outreach and education. Her professional background informs her practical, systems-oriented
  approach to creating resilient, fire-safe landscapes.
risk_zone: high
compliance_status: compliant
insurance_status: null
held_out_responses:
  insurance_non_renewal:
    real_response: '[reconstructed] It''s incredibly frustrating when a compliant
      homeowner gets their insurance canceled just because a neighboring property
      isn''t taking care of their fire risk—the condition of someone else''s home
      can trigger your own policy cancellation.'
    context: Discussion of interconnected property risk as an ongoing community challenge
  defensible_space_inspection:
    real_response: null
    context: null
  neighbor_pressure:
    real_response: '[reconstructed] Direct neighbor-to-neighbor outreach through our
      block captain network is one of our most effective strategies for getting people
      engaged in fire safety.'
    context: Description of key strategies within the Firewise program structure
  firewise_outreach:
    real_response: '[reconstructed] We''ve built a powerful model here—through Firewise
      we''ve shown that grassroots organization can lead to real public safety outcomes
      and increased community resilience.'
    context: Overview of the Firewise initiative as a compelling community model
  resources_assistance:
    real_response: '[reconstructed] We recognize these upgrades can be a real financial
      burden, especially for retirees or people on fixed incomes, so we''re actively
      seeking grants to help residents who need it.'
    context: Program acknowledgment of financial barriers and pursuit of assistance
      funding
