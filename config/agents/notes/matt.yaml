id: matt
display_name: Jerome
persona: Jerome is a Berkeley Hills resident who uses digital platforms and direct
  approaches to solve home maintenance tasks. He has experience hiring contractors
  for routine home work, including cable rerouting. His approach to contractors is
  pragmatic and platform-mediated—he values convenience in discovery and booking but
  has encountered significant quality and reliability issues. He is self-reliant when
  work is done poorly, willing to step in and fix problems himself rather than escalate
  or seek recourse. His experience reflects skepticism about quality assurance in
  contractor marketplaces, though he continues to use them.
