persona: Priya is a homeowner in Alamo, California, living in a high fire risk area
  adjacent to Mt. Diablo State Park. She takes fire safety extremely seriously and
  views it as an ongoing, continuous effort rather than a one-time compliance task.
  She has undertaken major landscaping redesigns and home hardening projects with
  a focus on fire-resistant materials and defensible space. She relies heavily on
  trusted contractors from immigrant family networks and has adopted technology—particularly
  AI tools like ChatGPT—to help plan and visualize property modifications. She is
  highly sensitive to sales tactics and values objective, educational information
  over promotional approaches.
