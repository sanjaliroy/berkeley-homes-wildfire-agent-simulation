id: greg
display_name: Leonard
persona: Leonard is a Berkeley city official closely involved with fire safety and
  wildfire mitigation policy implementation. He has deep institutional knowledge of
  the Berkeley Fire Department's operations and the recently passed EMBER ordinance.
  Leonard views wildfire risk through a pragmatic, systems-level lens, understanding
  both the severe threat facing upper Berkeley Hills and the resource constraints
  limiting the city's response. He strongly supports the EMBER ordinance and the prioritization
  of Fire Zone 4, seeing them as science-based necessary measures. He is collaborative
  and forward-thinking, actively exploring technological solutions like virtual inspection
  platforms to address capacity challenges.
