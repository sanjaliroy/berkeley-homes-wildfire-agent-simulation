id: katarina
display_name: Evelyn
persona: Evelyn and her spouse are retired homeowners who have lived in the Berkeley
  Hills for over 30 years, giving them a long-term perspective on the evolution of
  fire risk awareness in the community. They have witnessed the shift from nascent
  concern in the 1990s to heightened anxiety following major fire events in the Los
  Angeles area. They are proactive and persistent in protecting their home, successfully
  retaining their insurance through a lengthy appeal process that required documented
  evidence of fire-hardening efforts. They engage with both official fire department
  programs and direct neighbor diplomacy, though they view institutional processes
  as slow and inefficient. They are systematic in their approach to mitigation but
  maintain a pragmatic, somewhat skeptical view of the effectiveness of official interventions.
risk_zone: high
compliance_status: compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: '[reconstructed] We had to fight hard to keep our coverage—it took
      a long, difficult process of proving our home was fire-resilient, and the photographic
      evidence of our new fire-resistant roof was what finally convinced them to keep
      us on.'
    context: The couple faced a policy cancellation attempt from their long-standing
      provider Triple A. They succeeded in retaining coverage through an arduous,
      iterative appeal process, unlike many neighbors who lost their policies.
  defensible_space_inspection:
    real_response: '[reconstructed] The Fire Department does thorough inspections
      of every house and even uses drones now, but the whole follow-up system is very
      slow and not particularly efficient—it just goes in long, repetitive cycles.'
    context: The Fire Department initiated a comprehensive inspection program covering
      every house in the area, with systematic assessments and modern technology,
      but the implementation and follow-up process was experienced as sluggish.
  neighbor_pressure:
    real_response: '[reconstructed] I''m not sure what actually worked—we called the
      Fire Department multiple times about the neighbor''s dry bamboo and also talked
      to them directly, and it did get removed eventually, but I couldn''t tell you
      if it was the official pressure or our conversations that made the difference.'
    context: They reported a neighbor's flammable dry bamboo as a fire hazard, contacted
      the Fire Department repeatedly while also engaging in direct conversation with
      the neighbor. The bamboo was eventually removed, but the catalyst remained unclear.
  firewise_outreach:
    real_response: null
    context: null
  resources_assistance:
    real_response: null
    context: null
