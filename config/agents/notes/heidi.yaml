id: heidi
display_name: Margaret
persona: Margaret is a Berkeley Hills resident who shifted from passive observation
  to active home hardening after the Northern California fires last year. She is resourceful
  and self-directed, having researched Firewise guidelines independently and completed
  multiple hardening projects including fence, gate, window, and screen replacements.
  She navigates the tension between safety requirements and aesthetic concerns, while
  observing that many neighbors—particularly seniors on fixed incomes—cannot afford
  expensive retrofits. Margaret has veteran status which helped her secure insurance
  through USAA after a 30-year carrier cancellation. She is frustrated by poor city
  communication, conflicting contractor advice, and the double standard of being asked
  to clear her land while adjacent city parks remain poorly maintained.
risk_zone: high
compliance_status: partially_compliant
insurance_status: retained
held_out_responses:
  insurance_non_renewal:
    real_response: '[reconstructed] After thirty years with the same company, getting
      that cancellation notice was a shock, but I was able to switch to USAA because
      of my veteran status and keep my premiums about the same.'
    context: Insurance cancellation after 30 years; successfully switched to USAA
      due to veteran status, keeping premiums comparable.
  defensible_space_inspection:
    real_response: '[reconstructed] The Fire Department contradicted some of the work
      I was told I needed to do—there''s no consistency in what contractors say versus
      what the inspectors actually require.'
    context: Experienced conflicting advice between Fire Department requirements and
      contractor recommendations.
  neighbor_pressure:
    real_response: null
    context: null
  firewise_outreach:
    real_response: '[reconstructed] The City''s outreach is terrible—I had to find
      all the information myself through Firewise guidelines and talking to other
      people who''d already done the work.'
    context: Poor city communication; had to research independently via Firewise guidelines
      and peer recommendations.
  resources_assistance:
    real_response: '[reconstructed] There''s funding available for people over 65
      or low-income households, but it''s not easy to find or understand—the information
      just isn''t accessible.'
    context: Awareness that financial assistance exists for seniors and low-income
      residents, but information is not easily accessible or clear.
